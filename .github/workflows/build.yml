name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        shell: bash
        run: |
          npm install --no-fund --no-audit
          echo "--- Checking critical binaries ---"
          npx vite --version
          node -e "try { require('esbuild'); console.log('esbuild: OK') } catch(e) { console.log('esbuild: MISSING -', e.message) }"

      - name: Build Vite + TypeScript
        shell: bash
        run: npx vite build 2>&1 || { echo "::error::Vite build failed. Debug info:"; ls -la node_modules/.bin/ | grep -E 'vite|esbuild|rollup' || true; node -e "console.log(process.arch, process.platform)"; exit 1; }

      - name: Package with electron-builder
        shell: bash
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore
